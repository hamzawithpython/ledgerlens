<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LedgerLens</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      margin: 0; background: #f5f5f4; color: #1c1c1c; line-height: 1.5;
    }
    header { background: #1e293b; color: #fff; padding: 16px 24px; }
    header h1 { margin: 0; font-size: 20px; }
    header p { margin: 4px 0 0; font-size: 13px; color: #94a3b8; }
    .wrap { display: flex; gap: 24px; padding: 24px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 340px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    h2 { font-size: 15px; text-transform: uppercase; letter-spacing: 0.05em; color: #475569; margin: 0 0 12px; }
    .drop {
      display: block;
      border: 2px dashed #cbd5e1; border-radius: 8px; padding: 32px; text-align: center;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .drop:hover, .drop.over { background: #f1f5f9; border-color: #1e293b; }
    .drop input { display: none; }
    button {
      font: inherit; padding: 8px 16px; border-radius: 6px; border: none;
      cursor: pointer; font-weight: 600;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .btn-primary { background: #1e293b; color: #fff; }
    .btn-approve { background: #16a34a; color: #fff; }
    .btn-reject { background: #dc2626; color: #fff; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .badge-approved { background: #dcfce7; color: #166534; }
    .badge-needs_review { background: #fef3c7; color: #92400e; }
    .badge-rejected { background: #fee2e2; color: #991b1b; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #f1f5f9; }
    .num { font-variant-numeric: tabular-nums; text-align: right; }
    .issue { background: #fef2f2; border-left: 3px solid #dc2626; padding: 8px 12px; margin: 6px 0; font-size: 13px; border-radius: 4px; }
    .reasoning { background: #f8fafc; padding: 12px; border-radius: 6px; font-size: 13px; font-style: italic; color: #475569; margin-top: 12px; }
    .meta { font-size: 13px; color: #64748b; }
    .meta strong { color: #1c1c1c; }
    .queue-item { border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px; margin-bottom: 10px; }
    .queue-item .actions { margin-top: 8px; display: flex; gap: 8px; }
    .empty { color: #94a3b8; font-size: 13px; padding: 16px 0; text-align: center; }
    .spinner { color: #64748b; font-size: 13px; }
    .conf-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin-top: 4px; }
    .conf-fill { height: 100%; background: #16a34a; }
  </style>
</head>
<body>
  <header>
    <h1>LedgerLens</h1>
    <p>Agentic invoice processing with confidence-gated human review</p>
  </header>

  <div class="wrap">
    <!-- LEFT: upload + result -->
    <div class="col">
      <div class="card">
        <h2>Upload invoice</h2>
        <label class="drop" id="drop">
          <input type="file" id="file" accept="application/pdf" />
          <div id="drop-text">Drop a PDF here or click to choose</div>
        </label>
        <div id="upload-status" class="spinner" style="margin-top:12px;"></div>
      </div>

      <div class="card" id="result-card" style="display:none;">
        <h2>Result</h2>
        <div id="result"></div>
      </div>
    </div>

    <!-- RIGHT: review queue -->
    <div class="col">
      <div class="card">
        <h2>Review queue</h2>
        <div id="queue"><div class="spinner">Loading…</div></div>
      </div>
    </div>
  </div>

  <script>
    const API = ""; // same origin

    const money = (v, cur) => v == null ? "—" : `${cur || ""} ${Number(v).toFixed(2)}`;

    function badge(status) {
      const label = status.replace("_", " ");
      return `<span class="badge badge-${status}">${label}</span>`;
    }

    function renderResult(inv) {
      const ex = inv.extracted_json;
      const items = (ex.line_items || []).map(li => `
        <tr>
          <td>${li.description?.value ?? "—"}</td>
          <td class="num">${li.quantity?.value ?? "—"}</td>
          <td class="num">${money(li.unit_price?.value, ex.currency?.value)}</td>
          <td class="num">${money(li.amount?.value, ex.currency?.value)}</td>
        </tr>`).join("");

      const issues = (inv.issues_json || []).map(i =>
        `<div class="issue"><strong>${i.rule}</strong>: ${i.message}</div>`).join("");

      const confPct = Math.round((inv.overall_confidence ?? 0) * 100);

      document.getElementById("result-card").style.display = "block";
      document.getElementById("result").innerHTML = `
        <div class="meta">
          ${badge(inv.status)}
          &nbsp; <strong>${inv.vendor_name ?? "(no vendor)"}</strong>
          &nbsp; #${inv.invoice_number ?? "—"} &nbsp; ${inv.invoice_date ?? ""}
        </div>
        <div class="meta" style="margin-top:8px;">Confidence: ${confPct}%
          <div class="conf-bar"><div class="conf-fill" style="width:${confPct}%"></div></div>
        </div>
        <table style="margin-top:12px;">
          <thead><tr><th>Description</th><th class="num">Qty</th><th class="num">Unit</th><th class="num">Amount</th></tr></thead>
          <tbody>${items}</tbody>
        </table>
        <table style="margin-top:8px;">
          <tr><td>Subtotal</td><td class="num">${money(ex.subtotal?.value, ex.currency?.value)}</td></tr>
          <tr><td>Tax</td><td class="num">${money(ex.tax?.value, ex.currency?.value)}</td></tr>
          <tr><td>Other charges ${ex.other_charges_note?.value ? "(" + ex.other_charges_note.value + ")" : ""}</td><td class="num">${money(ex.other_charges?.value, ex.currency?.value)}</td></tr>
          <tr><td><strong>Total</strong></td><td class="num"><strong>${money(ex.total?.value, ex.currency?.value)}</strong></td></tr>
        </table>
        ${issues ? `<div style="margin-top:12px;">${issues}</div>` : ""}
        <div class="reasoning">${inv.agent_reasoning ?? ""}</div>
      `;
    }

    async function uploadFile(file) {
      const status = document.getElementById("upload-status");
      status.textContent = "Processing… (extraction + validation)";
      const fd = new FormData();
      fd.append("file", file);
      try {
        const res = await fetch(`${API}/invoices`, { method: "POST", body: fd });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          status.textContent = `Failed: ${err.detail || res.status}`;
          return;
        }
        const inv = await res.json();
        status.textContent = "";
        renderResult(inv);
        loadQueue();
      } catch (e) {
        status.textContent = `Error: ${e.message}`;
      }
    }

    async function loadQueue() {
      const el = document.getElementById("queue");
      try {
        const res = await fetch(`${API}/invoices?status=needs_review`);
        const rows = await res.json();
        if (!rows.length) {
          el.innerHTML = `<div class="empty">Nothing to review. All clear.</div>`;
          return;
        }
        el.innerHTML = rows.map(r => `
          <div class="queue-item">
            <div class="meta">
              ${badge(r.status)} <strong>${r.vendor_name ?? "(no vendor)"}</strong>
              &nbsp; #${r.invoice_number ?? "—"}
            </div>
            <div class="meta">Total: <strong>${money(r.total, r.currency)}</strong> · Confidence: ${Math.round((r.overall_confidence ?? 0) * 100)}%</div>
            <div class="actions">
              <button class="btn-approve" onclick="resolve(${r.id}, true)">Approve</button>
              <button class="btn-reject" onclick="resolve(${r.id}, false)">Reject</button>
            </div>
          </div>`).join("");
      } catch (e) {
        el.innerHTML = `<div class="empty">Could not load queue: ${e.message}</div>`;
      }
    }

    async function resolve(id, approve) {
      await fetch(`${API}/invoices/${id}/resolve?approve=${approve}`, { method: "POST" });
      loadQueue();
    }

    // Wire up upload (click + drag/drop)
    const drop = document.getElementById("drop");
    const fileInput = document.getElementById("file");
    fileInput.addEventListener("change", () => { if (fileInput.files[0]) uploadFile(fileInput.files[0]); });
    drop.addEventListener("dragover", e => { e.preventDefault(); drop.classList.add("over"); });
    drop.addEventListener("dragleave", () => drop.classList.remove("over"));
    drop.addEventListener("drop", e => {
      e.preventDefault(); drop.classList.remove("over");
      if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
    });

    loadQueue();
  </script>
</body>
</html>
